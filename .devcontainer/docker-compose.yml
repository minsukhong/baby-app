version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    # 서버 백그라운드 실행 + VSCode 접속 유지
    command: sh -c "npm run dev -- -H 0.0.0.0 & sleep infinity"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/babyapp
    depends_on:
      - db
    # 서버 백그라운드 실행 + VSCode 접속 유지
    command: sh -c "cd /app && uvicorn main:app --reload --host 0.0.0.0 --port 8000 & sleep infinity"

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=babyapp
    volumes:
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
